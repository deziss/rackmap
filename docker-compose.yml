services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/data/inventory.db
      PORT: "3001"
      BETTER_AUTH_URL: http://api:3001
      # Override remaining vars from .env file or env:
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      PING_INTERVAL_MS: ${PING_INTERVAL_MS:-60000}
      PING_CONCURRENCY: ${PING_CONCURRENCY:-10}
      STATUS_RETENTION_DAYS: ${STATUS_RETENTION_DAYS:-30}
      STATUS_FLIP_THRESHOLD: ${STATUS_FLIP_THRESHOLD:-2}
      NOTIFY_WEBHOOK_URL: ${NOTIFY_WEBHOOK_URL:-}
      NOTIFY_TELEGRAM_BOT_TOKEN: ${NOTIFY_TELEGRAM_BOT_TOKEN:-}
      NOTIFY_TELEGRAM_CHAT_ID: ${NOTIFY_TELEGRAM_CHAT_ID:-}
      BACKUP_DIR: /backups
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-changeme123}
      # SSH terminal kill-switch — set SSH_ENABLED=true to enable (admin-only RCE feature)
      SSH_ENABLED: ${SSH_ENABLED:-false}
      SSH_CONNECT_TIMEOUT_MS: ${SSH_CONNECT_TIMEOUT_MS:-10000}
      SSH_IDLE_TIMEOUT_MS: ${SSH_IDLE_TIMEOUT_MS:-300000}
      SSH_MAX_SESSION_MS: ${SSH_MAX_SESSION_MS:-3600000}
      SSH_MAX_CONCURRENT: ${SSH_MAX_CONCURRENT:-5}
      # Live metrics via agentless SSH exec
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      METRICS_SSH_TIMEOUT_MS: ${METRICS_SSH_TIMEOUT_MS:-10000}
    volumes:
      - sqlite_data:/data
      - backups:/backups
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Baked into the JS bundle at build time — set false to allow copy/right-click
        VITE_SECURITY_LOCK: ${VITE_SECURITY_LOCK:-false}
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

volumes:
  sqlite_data:
  backups:

networks:
  internal:

